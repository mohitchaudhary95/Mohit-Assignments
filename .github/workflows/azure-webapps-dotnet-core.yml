name: Build and deploy ASP.NET Core app to Azure Web App

env:
  AZURE_WEBAPP_NAME: MohitWebSite1   # 🔥 your app service name
  DOTNET_VERSION: '10.0.x'

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "Week5/Mohit Website/Mohit Website/Mohit Website.csproj"

      - name: Build
        run: dotnet build "Week5/Mohit Website/Mohit Website/Mohit Website.csproj" --configuration Release --no-restore

      - name: Publish
        run: dotnet publish "Week5/Mohit Website/Mohit Website/Mohit Website.csproj" -c Release -o ./publish

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
