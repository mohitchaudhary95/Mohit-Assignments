<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Create Product</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <div class="navbar">🛒 Product Manager</div>
    <div class="container">
        <h2>Create Product</h2>
        <div id="alert"></div>
        <form id="createForm">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" placeholder="Enter product name" />
                <div class="error" id="nameErr"></div>
            </div>
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" id="price" step="0.01" min="0.01" max="10000" placeholder="Enter price" />
                <div class="error" id="priceErr"></div>
            </div>
            <div class="form-group">
                <label>Category</label>
                <input type="text" id="category" placeholder="Enter category" />
                <div class="error" id="categoryErr"></div>
            </div>
            <button type="submit" class="btn btn-success">Create</button>
            <a href="/index.html" class="btn btn-secondary" style="margin-left:8px;">Back</a>
        </form>
    </div>

    <script>
        function validate(name, price, category) {
            let valid = true;
            document.getElementById('nameErr').textContent = '';
            document.getElementById('priceErr').textContent = '';
            document.getElementById('categoryErr').textContent = '';

            if (!name.trim()) {
                document.getElementById('nameErr').textContent = 'Please enter product name';
                valid = false;
            }
            if (!price || price < 0.01 || price > 10000) {
                document.getElementById('priceErr').textContent = 'Price must be between 0.01 and 10000';
                valid = false;
            }
            if (!category.trim()) {
                document.getElementById('categoryErr').textContent = 'Please enter product category';
                valid = false;
            }
            return valid;
        }

        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const price = parseFloat(document.getElementById('price').value);
            const category = document.getElementById('category').value;

            if (!validate(name, price, category)) return;

            const res = await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price, category })
            });

            if (res.ok) {
                window.location.href = '/index.html?msg=' + encodeURIComponent('Product created successfully!');
            } else {
                const err = await res.json();
                document.getElementById('alert').innerHTML =
                    `<div class="alert alert-danger">Failed to create product.</div>`;
            }
        });
    </script>
    <!--<script src="/js/app.js"></script>-->
</body>
</html>
