<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Product Details</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="navbar">🛒 Product Manager</div>
<div class="container">
    <h2>Product Details</h2>
    <dl id="details"></dl>
    <br/>
    <div id="actions"></div>
</div>

<script>
    const id = new URLSearchParams(window.location.search).get('id');

    async function loadProduct() {
        const res = await fetch(`/api/products/${id}`);
        if (!res.ok) { window.location.href = '/index.html'; return; }
        const p = await res.json();

        document.getElementById('details').innerHTML = `
            <dt>ID</dt>       <dd>${p.id}</dd>
            <dt>Name</dt>     <dd>${p.name}</dd>
            <dt>Price</dt>    <dd>₹${parseFloat(p.price).toFixed(2)}</dd>
            <dt>Category</dt> <dd>${p.category}</dd>
        `;
        document.getElementById('actions').innerHTML = `
            <a href="/edit.html?id=${p.id}"   class="btn btn-warning">Edit</a>
            <a href="/index.html"              class="btn btn-secondary" style="margin-left:8px;">Back to List</a>
        `;
    }

    loadProduct();
</script>
<script src="/js/app.js"></script>
</body>
</html>
