<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | EmpManager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-logo {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .login-title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 6px;
        }

        .login-subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 36px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

            .form-group label {
                font-size: 0.85rem;
                font-weight: 600;
                color: #475569;
            }

            .form-group input {
                padding: 12px 16px;
                border: 1.5px solid #e2e8f0;
                border-radius: 8px;
                font-size: 0.95rem;
                outline: none;
                transition: border 0.2s;
                color: #1e293b;
            }

                .form-group input:focus {
                    border-color: #3b82f6;
                }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

            .btn-login:hover {
                background: #2563eb;
            }

            .btn-login:disabled {
                background: #93c5fd;
                cursor: not-allowed;
            }

        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-top: 16px;
            display: none;
            text-align: center;
        }

        .footer-text {
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: 28px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="login-logo">👥</div>
        <h1 class="login-title">EmpManager</h1>
        <p class="login-subtitle">Sign in to your account</p>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password"
                   onkeydown="if(event.key==='Enter') handleLogin()" />
        </div>

        <button class="btn-login" id="login-btn" onclick="handleLogin()">
            Sign In
        </button>

        <div class="error-msg" id="error-msg"></div>

        <p class="footer-text">Employee Management System</p>
    </div>

    <script>
        // If already logged in redirect to dashboard
        if (localStorage.getItem('emp_token')) {
            window.location.href = '/index.html';
        }

        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const loginBtn = document.getElementById('login-btn');

            // Basic validation
            if (!username || !password) {
                showError('Please enter both username and password.');
                return;
            }

            // Show loading state
            loginBtn.disabled    = true;
            loginBtn.textContent = 'Signing in...';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('https://localhost:7018/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // Save token and user info
                    localStorage.setItem('emp_token',    data.token);
                    localStorage.setItem('emp_username', data.username);
                    localStorage.setItem('emp_role',     data.role);

                    // Redirect to dashboard
                    window.location.href = '/index.html';
                } else {
                    showError(data.message || data.Message || 'Invalid credentials.');
                }

            } catch (err) {
                showError('Could not connect to server. Please try again.');
            } finally {
                loginBtn.disabled    = false;
                loginBtn.textContent = 'Sign In';
            }
        }

        function showError(msg) {
            const errorMsg = document.getElementById('error-msg');
            errorMsg.textContent   = msg;
            errorMsg.style.display = 'block';
        }
    </script>

</body>
</html>
