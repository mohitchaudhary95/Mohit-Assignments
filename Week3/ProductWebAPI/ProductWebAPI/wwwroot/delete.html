<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Delete Product</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <div class="navbar">🛒 Product Manager</div>
    <div class="container">
        <h2 style="color:#dc3545;">Confirm Delete</h2>
        <p>Are you sure you want to delete this product?</p>
        <dl id="details"></dl>
        <br />
        <button class="btn btn-danger" id="confirmBtn">Yes, Delete</button>
        <a class="btn btn-secondary" href="/index.html" style="margin-left:8px;">Cancel</a>
    </div>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');

        async function loadProduct() {
            const res = await fetch(`/api/products/${id}`);
            if (!res.ok) { window.location.href = '/index.html'; return; }
            const p = await res.json();

            document.getElementById('details').innerHTML = `
                <dt>Name</dt>     <dd>${p.name}</dd>
                <dt>Price</dt>    <dd>₹${parseFloat(p.price).toFixed(2)}</dd>
                <dt>Category</dt> <dd>${p.category}</dd>
            `;
        }

        document.getElementById('confirmBtn').addEventListener('click', async () => {
            const res = await fetch(`/api/products/${id}`, { method: 'DELETE' });
            if (res.ok) {
                window.location.href = '/index.html?msg=' + encodeURIComponent('Product deleted successfully!');
            }
        });

        loadProduct();
    </script>
    <script src="/js/app.js"></script>
</body>
</html>
