<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script type="text/javascript">

        function add() {
            var total;
            var first = parseFloat(document.getElementById("text1").value);
            var second = parseFloat(document.getElementById("text2").value);
            total = first + second;
            alert('the total is' + total);

        }

        function add1() {
            var total;
            var first = parseFloat(document.getElementsByName("first").value);
            var second = parseFloat(document.getElementByName("second").value);
            total = first + second;
            alert('the total is' + total);

        }

    </script>
    <pre>
1st Number : <input type="text" id="text1" name="first" placeholder="enter 1st number "/>
2nd number :<input type="text" id="text2" name="second" placeholder="enter 2nd  number " />


<input type="button" value="sum" onclick="add1()" />

    </pre>
</body>

</html>
