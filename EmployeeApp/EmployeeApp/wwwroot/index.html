<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Management</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div class="sidebar">
        <div class="logo">👥 EmpManager</div>
        <nav>
            <a href="#" class="nav-link active" onclick="showSection('dashboard', true)">📊 Dashboard</a>
            <a href="#" class="nav-link" onclick="showSection('employees', true)">📋 Employees</a>
            <a href="#" class="nav-link" onclick="showSection('add', true)">➕ Add Employee</a>
        </nav>
        <div class="sidebar-footer">
            <div class="logged-in-user">👤 <span id="sidebar-username"></span></div>
            <button class="btn-logout" onclick="logout()">🚪 Logout</button>
        </div>
    </div>

    <div class="main">

        <!-- ── DASHBOARD ── -->
        <section id="section-dashboard">
            <h2 class="page-title">Dashboard</h2>
            <div class="stats-grid">
                <div class="stat-card blue">
                    <div class="stat-num" id="stat-total">--</div>
                    <div class="stat-label">Total Employees</div>
                </div>
                <div class="stat-card green">
                    <div class="stat-num" id="stat-active">--</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat-card red">
                    <div class="stat-num" id="stat-inactive">--</div>
                    <div class="stat-label">Inactive</div>
                </div>
            </div>
            <div class="card">
                <h3>Employees by Department</h3>
                <table class="table" id="dept-table">
                    <thead><tr><th>Department</th><th>Count</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <!-- ── EMPLOYEE LIST ── -->
        <section id="section-employees" style="display:none">
            <h2 class="page-title">All Employees</h2>

            <div class="toolbar">
                <input type="text" id="search-input" placeholder="🔍 Search by name or email..." oninput="loadEmployees()" />
                <select id="filter-dept" onchange="loadEmployees()">
                    <option value="">All Departments</option>
                    <option>Engineering</option>
                    <option>HR</option>
                    <option>Finance</option>
                    <option>Marketing</option>
                    <option>Operations</option>
                </select>
                <select id="filter-status" onchange="loadEmployees()">
                    <option value="">All Status</option>
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                </select>
                <button class="btn btn-excel" onclick="exportToExcel()">📥 Export Excel</button>
                <button class="btn btn-csv" onclick="exportToCSV()">📄 Export CSV</button>
            </div>

            <div class="card">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Designation</th>
                            <th>Salary</th>
                            <th>Joined</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="emp-table-body"></tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>
        </section>

        <!-- ── ADD / EDIT FORM ── -->
        <section id="section-add" style="display:none">
            <h2 class="page-title" id="form-title">Add Employee</h2>
            <div class="card form-card">
                <form id="emp-form" onsubmit="submitForm(event)">
                    <input type="hidden" id="emp-id" />
                    <div class="form-grid">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" id="firstName" placeholder="First Name" required />
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" id="lastName" placeholder="Last Name" required />
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" placeholder="Email" required />
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" id="phone" placeholder="Phone" required />
                        </div>
                        <div class="form-group">
                            <label>Department</label>
                            <select id="department" required>
                                <option value="">Select Department</option>
                                <option>Engineering</option>
                                <option>HR</option>
                                <option>Finance</option>
                                <option>Marketing</option>
                                <option>Operations</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Designation</label>
                            <input type="text" id="designation" placeholder="e.g. Software Developer" required />
                        </div>
                        <div class="form-group">
                            <label>Salary</label>
                            <input type="number" id="salary" placeholder="Salary" required />
                        </div>
                        <div class="form-group">
                            <label>Date of Joining</label>
                            <input type="date" id="dateOfJoining" required />
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="submit-btn">➕ Add Employee</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">✖ Cancel</button>
                    </div>
                    <p id="form-error" class="error-msg"></p>
                </form>
            </div>
        </section>

    </div>

    <!-- ── DETAIL MODAL ── -->
    <div id="modal-overlay" class="modal-overlay" style="display:none">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✖</button>
            <h3 id="modal-name"></h3>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
